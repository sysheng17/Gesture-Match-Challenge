<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gesture Match Challenge</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://adsgram.ai/sdk/v1/adsgram.js"></script>
    
    <style>
        :root { --primary: #00d2ff; --success: #00ff88; --danger: #ff4e50; --gold: #ffd700; }
        body { margin: 0; background: #0f0f0f; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #video-wrap { width: 100%; height: 35vh; background: #000; position: relative; }
        #input_video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        #guide-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: scaleX(-1); }
        
        #game-ui { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #target-number { font-size: 140px; font-weight: 900; color: var(--primary); margin: 0; transition: transform 0.2s; }
        
        #timer-bg { width: 80%; height: 12px; background: #333; border-radius: 6px; margin: 25px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--danger); }
        
        #stats { font-size: 20px; letter-spacing: 1px; }
        #detected-hint { margin-top: 10px; color: var(--success); font-weight: bold; }
        
        /* Energy UI */
        #energy-display { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 20px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; z-index: 10; }

        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        .btn { padding: 18px 45px; font-size: 22px; background: var(--primary); color: #000; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.95); }
        .btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        .ad-btn { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="energy-display">⚡ Energy: <span id="energy-val">5</span></div>

    <div id="overlay">
        <div id="msg">
            <h1 id="title">Gesture Match</h1>
            <p id="desc">Preparing AI Vision...</p>
        </div>
        <button id="startBtn" class="btn" disabled>Loading...</button>
    </div>

    <div id="video-wrap">
        <video id="input_video" playsinline></video>
        <canvas id="guide-canvas"></canvas>
    </div>

    <div id="game-ui">
        <div id="target-number">?</div>
        <div id="timer-bg"><div id="timer-bar"></div></div>
        <div id="stats">Score: <span id="score">0</span> | Lives: <span id="hp">3</span></div>
        <div id="detected-hint">Detected: <span id="detected-count">0</span></div>
    </div>

    <script>
        // 初始化 Telegram WebApp
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.expand();
            window.Telegram.WebApp.ready();
        }

        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('guide-canvas');
        const ctx = canvasElement.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const overlay = document.getElementById('overlay');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('desc');
        const timerBar = document.getElementById('timer-bar');
        const energyEl = document.getElementById('energy-val');

        // --- Configuration ---
        const MAX_ENERGY = 5;
        let storedEnergy = localStorage.getItem('gesture_match_energy');
        let energy = (storedEnergy !== null && !isNaN(parseInt(storedEnergy))) ? parseInt(storedEnergy) : MAX_ENERGY;

        // 使用你的真實 Block ID
        const AdController = window.Adsgram ? window.Adsgram.init({ blockId: "24275" }) : null;
        
        let game = {
            active: false,
            score: 0,
            hp: 3,
            target: 0,
            lastTarget: 0,
            timeLeft: 5,
            maxTime: 5,
            detected: 0
        };

        let cameraStarted = false;
        let animationFrameId = null;

        function updateEnergyUI() {
            if (isNaN(energy)) energy = MAX_ENERGY;
            energyEl.innerText = energy;
            localStorage.setItem('gesture_match_energy', energy.toString());
            
            if (energy <= 0) {
                startBtn.innerText = "📺 Refill Energy (Watch Ad)";
                startBtn.classList.add('ad-btn');
                startBtn.onclick = handleAdRequest;
            } else {
                startBtn.innerText = game.score > 0 ? "Play Again" : "Start Game";
                startBtn.classList.remove('ad-btn');
                startBtn.onclick = startGame;
            }
        }

        async function handleAdRequest() {
            startBtn.disabled = true;
            startBtn.innerText = "Connecting to Ads...";
            
            if (!AdController) {
                alert("Ad system is unavailable. Please check your connection or turn off AdBlock.");
                startBtn.disabled = false;
                updateEnergyUI();
                return;
            }

            try {
                // 顯示廣告
                const result = await AdController.show();
                
                // 嚴格判斷廣告是否完整播放
                if (result && result.done) {
                    energy = MAX_ENERGY;
                    updateEnergyUI();
                    alert("Success! Energy refilled.");
                } else {
                    alert("You must watch the full ad to earn energy.");
                }
            } catch (e) {
                console.error("Adsgram Error:", e);
                // 針對常見錯誤進行提示
                if (e.message && e.message.includes('not found')) {
                    alert("No ads available right now. Please try again in a few minutes.");
                } else {
                    alert("Failed to load ad. Please try again.");
                }
            } finally {
                startBtn.disabled = false;
                updateEnergyUI();
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        hands.onResults((results) => {
            drawSkeleton(results);
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                let count = 0;
                [8, 12, 16, 20].forEach((tip, idx) => {
                    const pip = [6, 10, 14, 18][idx];
                    if (lm[tip].y < lm[pip].y) count++;
                });
                if (Math.abs(lm[4].x - lm[5].x) > 0.08) count++;
                
                game.detected = count;
                document.getElementById('detected-count').innerText = count;
                
                if (game.active && count === game.target) {
                    handleCorrect();
                }
            }
        });

        function drawSkeleton(results) {
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;
            ctx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    ctx.fillStyle = "#00d2ff";
                    for (const point of landmarks) {
                        ctx.beginPath();
                        ctx.arc(point.x * canvasElement.width, point.y * canvasElement.height, 4, 0, 2 * Math.PI);
                        ctx.fill();
                    }
                }
            }
        }

        const camera = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });

        setTimeout(() => {
            startBtn.disabled = false;
            descEl.innerText = "Vision System Ready!";
            updateEnergyUI();
        }, 3000);

        function startGame() {
            if (energy <= 0) return;
            energy--;
            updateEnergyUI();

            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            overlay.style.display = 'none';
            game.score = 0;
            game.hp = 3;
            game.lastTarget = 0;
            game.active = true;
            
            document.getElementById('score').innerText = "0";
            document.getElementById('hp').innerText = "3";
            
            if (!cameraStarted) {
                camera.start();
                cameraStarted = true;
            }
            
            nextRound();
            gameLoop();
        }

        function nextRound() {
            let nextNum;
            do {
                nextNum = Math.floor(Math.random() * 5) + 1;
            } while (nextNum === game.lastTarget);
            
            game.target = nextNum;
            game.lastTarget = nextNum;
            game.timeLeft = game.maxTime;
            
            const el = document.getElementById('target-number');
            el.innerText = game.target;
            el.style.color = "var(--primary)";
            el.style.transform = "scale(1)";
        }

        function handleCorrect() {
            game.active = false;
            game.score += 10;
            document.getElementById('score').innerText = game.score;
            
            const el = document.getElementById('target-number');
            el.style.color = "var(--success)";
            el.style.transform = "scale(1.2)";
            
            setTimeout(() => {
                if (game.hp > 0) {
                    nextRound();
                    game.active = true;
                }
            }, 500);
        }

        function gameLoop() {
            if (game.hp <= 0) return;

            if (game.active) {
                game.timeLeft -= 0.03;
                const percentage = Math.max(0, (game.timeLeft / game.maxTime) * 100);
                timerBar.style.width = percentage + "%";
                
                if (game.timeLeft <= 0) {
                    game.hp--;
                    document.getElementById('hp').innerText = game.hp;
                    
                    if (game.hp <= 0) {
                        endGame();
                        return;
                    } else {
                        nextRound();
                    }
                }
            }
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        function endGame() {
            game.active = false;
            overlay.style.display = 'flex';
            titleEl.innerText = "Game Over";
            descEl.innerHTML = `Final Score: <span style="font-size:32px; color:var(--success)">${game.score}</span>`;
            updateEnergyUI();
        }

        updateEnergyUI();
    </script>
</body>
</html>
